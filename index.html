<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- font-awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.2.0/css/all.min.css" integrity="sha512-F/yRpRY8sctKzP7exU5PLGejwg/QtjDX6CIy/41nApe7JqdZgCcCzJTNq9Rcp/XwbeeTGillGevBakruY15pxA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- For Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Font - Montserrat -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    
    <link rel="icon" href="./images/logo.png">
    <title>Spotify - Web Player : Music for everyone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main">
        <div class="sidebar">
            <div class="navbar">
                <div class="nav-option">
                    <i class="fa-solid fa-house" style="color: #fff;"></i>
                    <a href="#home">Home</a>
                </div>
                <div class="nav-option" id="search">
                    <i class="fa-solid fa-magnifying-glass" style="color: #fff;"></i>
                    <a href="#search">Search</a>
                </div>   
            </div>
            <div class="library">
                <div class="options">
                    <div class="lib-option">
                        <img src="./images/library_icon.png" alt="library icon">
                        <a href="#">Your Library</a>
                        <i class="fa-solid fa-plus" style="color:#fff;"></i>
                        <i class="fa-solid fa-arrow-right" style="color:#fff;"></i>
                    </div>
                    <div class="boxes"></div>
                </div>
            </div>
        </div>
        <div class="main-content">Main content</div>
        <div class="music-player">Music Player</div>
    </div>
</body>
</html>
